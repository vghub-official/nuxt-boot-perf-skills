name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: verify-env（目标 fixture：仅解析该子包依赖，集合仓根不装 playwright）
        run: |
          cd test/fixtures/verify-env-target
          npm install --no-audit --no-fund
          node ../../../skills/nuxt-boot-timing/scripts/verify-env.mjs
      - name: test
        run: node --test test/*.test.mjs
